services:
  - type: web
    name: edualign
    runtime: python
    # Use an always-on-ish configuration to avoid frequent 15-minute inactivity sleep.
    # (On Render free plans, web services may still sleep regardless.)
    plan: starter
    region: oregon
    branch: main
    buildCommand: bash build.sh
    healthCheckPath: /health
    scaling:
      minInstances: 1
      maxInstances: 1
    # Be resilient if PORT is unset/empty; Render's default expected port is 10000.
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  # Keep-alive ping to prevent Render from idling the web service too quickly.
  - type: cron
    name: edualign-keepalive
    runtime: node
    schedule: '*/5 * * * *'
    buildCommand: 'true'
    startCommand: node -e "const https=require('https'); const url='https://edualign-nymh.onrender.com/health'; const req=https.get(url,{timeout:5000},res=>{res.resume(); res.on('end',()=>process.exit(0));}); req.on('error',()=>process.exit(0)); req.on('timeout',()=>{req.destroy(); process.exit(0);});"
