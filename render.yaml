services:
  - type: web
    name: edualign
    runtime: python
    region: oregon
    branch: main
    buildCommand: bash build.sh
    # Be resilient if PORT is unset/empty; Render's default expected port is 10000.
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000}
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
